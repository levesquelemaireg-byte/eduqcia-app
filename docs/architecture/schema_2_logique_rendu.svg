<svg width="100%" viewBox="0 0 680 760" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
<title>Schéma 2 v2 : logique de rendu et propagation des modes</title>
<desc>Chaque entité a trois modes de rendu. Les renderers supérieurs délèguent au renderer document canonique. L'aperçu imprimé possède en plus quatre variantes de composition. Le mode se propage, les variantes restent au niveau épreuve.</desc>
<defs>
<marker id="arrow2v2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<text x="40" y="32" font-size="14" font-weight="500" fill="#2C2C2A">Trois modes de rendu par entité stockée</text>
<text x="40" y="50" font-size="12" fill="#5F5E5A">Le mode se propage le long de la hiérarchie</text>

<rect x="40" y="75" width="600" height="95" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="60" y="100" font-size="14" font-weight="500" fill="#085041">EpreuveRenderer</text>
<rect x="60" y="115" width="180" height="42" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="150" y="140" font-size="12" fill="#085041" text-anchor="middle">Sommaire</text>
<rect x="250" y="115" width="180" height="42" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="140" font-size="12" fill="#085041" text-anchor="middle">Aperçu imprimé</text>
<rect x="440" y="115" width="180" height="42" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="530" y="140" font-size="12" fill="#085041" text-anchor="middle">Miniature</text>

<line x1="340" y1="170" x2="340" y2="185" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2v2)"/>
<text x="200" y="178" font-size="12" fill="#5F5E5A" text-anchor="end">délègue le mode</text>
<text x="480" y="178" font-size="11" fill="#888780" font-style="italic">4 variantes de composition ici →</text>

<rect x="40" y="190" width="600" height="95" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="60" y="215" font-size="14" font-weight="500" fill="#085041">TacheRenderer</text>
<rect x="60" y="230" width="180" height="42" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="150" y="255" font-size="12" fill="#085041" text-anchor="middle">Sommaire</text>
<rect x="250" y="230" width="180" height="42" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="255" font-size="12" fill="#085041" text-anchor="middle">Aperçu imprimé</text>
<rect x="440" y="230" width="180" height="42" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="530" y="255" font-size="12" fill="#085041" text-anchor="middle">Miniature</text>

<line x1="340" y1="285" x2="340" y2="313" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2v2)"/>
<text x="350" y="305" font-size="12" fill="#5F5E5A">délègue le mode</text>

<rect x="40" y="318" width="600" height="95" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="60" y="343" font-size="14" font-weight="500" fill="#085041">DocumentRenderer — composant canonique unique</text>
<rect x="60" y="358" width="180" height="42" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="150" y="383" font-size="12" fill="#085041" text-anchor="middle">Sommaire</text>
<rect x="250" y="358" width="180" height="42" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="383" font-size="12" fill="#085041" text-anchor="middle">Aperçu imprimé</text>
<rect x="440" y="358" width="180" height="42" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="530" y="383" font-size="12" fill="#085041" text-anchor="middle">Miniature</text>

<text x="40" y="448" font-size="14" font-weight="500" fill="#2C2C2A">Variantes d'aperçu imprimé (niveau épreuve)</text>
<text x="40" y="466" font-size="12" fill="#5F5E5A">Règles de composition, pas modes de rendu — n'altèrent pas le rendu des éléments</text>

<rect x="40" y="480" width="140" height="55" rx="8" fill="#CECBF6" stroke="#3C3489" stroke-width="0.5"/>
<text x="110" y="500" font-size="12" fill="#3C3489" text-anchor="middle" font-weight="500">Formatif</text>
<text x="110" y="518" font-size="11" fill="#3C3489" text-anchor="middle">1 feuillet continu</text>

<rect x="190" y="480" width="140" height="55" rx="8" fill="#CECBF6" stroke="#3C3489" stroke-width="0.5"/>
<text x="260" y="500" font-size="12" fill="#3C3489" text-anchor="middle" font-weight="500">Sommatif standard</text>
<text x="260" y="518" font-size="11" fill="#3C3489" text-anchor="middle">2 feuillets</text>

<rect x="340" y="480" width="140" height="55" rx="8" fill="#CECBF6" stroke="#3C3489" stroke-width="0.5"/>
<text x="410" y="500" font-size="12" fill="#3C3489" text-anchor="middle" font-weight="500">Ministérielle</text>
<text x="410" y="518" font-size="11" fill="#3C3489" text-anchor="middle">3 feuillets</text>

<rect x="490" y="480" width="140" height="55" rx="8" fill="#CECBF6" stroke="#3C3489" stroke-width="0.5"/>
<text x="560" y="500" font-size="12" fill="#3C3489" text-anchor="middle" font-weight="500">Corrigé</text>
<text x="560" y="518" font-size="11" fill="#3C3489" text-anchor="middle">flag orthogonal</text>

<rect x="40" y="560" width="290" height="85" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="56" y="584" font-size="14" font-weight="500" fill="#712B13">Rendu outil d'évaluation</text>
<text x="56" y="604" font-size="12" fill="#993C1D">lookup(OI, comportement)</text>
<text x="56" y="622" font-size="12" fill="#993C1D">Visible en sommaire et aperçu imprimé</text>
<text x="56" y="640" font-size="12" fill="#993C1D">Invisible en miniature</text>

<rect x="350" y="560" width="290" height="85" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="366" y="584" font-size="14" font-weight="500" fill="#712B13">Rendu espace de production</text>
<text x="366" y="604" font-size="12" fill="#993C1D">Sommaire : paramètres</text>
<text x="366" y="622" font-size="12" fill="#993C1D">Papier : espace réel</text>
<text x="366" y="640" font-size="12" fill="#993C1D">Miniature : indicateur</text>

<rect x="40" y="665" width="600" height="90" rx="12" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="56" y="689" font-size="14" font-weight="500" fill="#633806">Invariants de rendu</text>
<text x="56" y="711" font-size="12" fill="#854F0B">1. Tout rendu de document passe par DocumentRenderer — aucune réimplémentation</text>
<text x="56" y="729" font-size="12" fill="#854F0B">2. Épreuve/Tâche délèguent, ne rendent jamais le contenu d'un document</text>
<text x="56" y="747" font-size="12" fill="#854F0B">3. Les variantes orchestrent les éléments — elles n'altèrent pas leur rendu (INV-R6)</text>
</svg>
